<template> 

    <div class="progress-container">

        <template for:each={steps} for:item="step">

            <div
                key={step.id}
                class={step.stepClass}>

                <div class={step.circleClass}>

                    <template if:true={step.completed}>
                        ✓
                    </template>

                    <template if:false={step.completed}>
                        {step.id}
                    </template>

                </div>

                <div class="progress-label">
                    {step.label}

                    <template if:true={step.note}>

                        <span class="progress-note">
                            {step.note}
                        </span>

                    </template>
                </div>

            </div>

        </template>

    </div>

</template>
