<template> 

    <div class="progress-container">

        <template for:each={steps} for:item="step">

            <div
                key={step.id}
                class="progress-step">

                <div class={step.circleClass}>

                    <template if:true={step.completed}>
                        ✓
                    </template>

                    <template if:false={step.completed}>
                        {step.id}
                    </template>

                </div>

                <div class="progress-label">
                    {step.label}
                </div>

            </div>

        </template>

    </div>

</template>
